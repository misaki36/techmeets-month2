# ワークフローの名前
name: Build and Deploy

# mainブランチにpushされた時に自動実行
on:
  push:
    branches:
      - main

jobs:
  # ジョブ1: Dockerイメージをビルドしてmainブランチにpush
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードをチェックアウト（ダウンロード）
      - uses: actions/checkout@v4

      # Docker HubにログインStudent
      - name: Docker Hubにログイン
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # イメージのタグを自動生成
      # type=sha → GitのコミットID（例: abc1234）をタグにする
      # type=raw,value=latest → latestタグも付ける
      - name: イメージのタグ・ラベルを生成
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/techmeets
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Dockerイメージをビルドしてpush
      - name: ビルドしてDocker Hubにpush
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

