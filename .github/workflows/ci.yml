# このワークフロー全体の名前
name: CI

# いつ実行するか：main/developブランチへのpushかPR作成時
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # ステップ1: リポジトリのコードをダウンロード
      - name: チェックアウト
        uses: actions/checkout@v4
      
      # ステップ2: PHPをインストール
      - name: PHP環境のセットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, pdo, mysql
      
      # ステップ3: laravel-docker-app/src に移動してcomposerを実行
      - name: Composerの依存関係をインストール
        run: composer install --prefer-dist --no-progress
        working-directory: laravel-docker-app/src
      
      # ステップ4: .envファイルを作成してアプリキーを生成
      - name: .envファイルの作成
        run: |
          cp .env.example .env
          php artisan key:generate
        working-directory: laravel-docker-app/src
      
      # ステップ5: テストを実行
      - name: テスト実行
        run: php artisan test
        working-directory: laravel-docker-app/src